# Data Configuration
data:
  path: "data/cybersecurity_intrusion_data.csv"
  target_column: "attack_detected"
  drop_columns:
    - "attack_detected"
    - "session_id"
  test_size: 0.2
  random_state: 42
  stratify: true

# Preprocessing Configuration
preprocessing:
  handle_missing:
    encryption_used: "Unknown"
  categorical_encoding: "onehot"
  resampling:
    method: "smote"
    sampling_strategy: "minority"
    random_state: 42

# Feature Engineering Configuration
features:
  core_features:
    - "login_attempts"
    - "failed_logins"
    - "ip_reputation_score"
    - "failed_login_ratio"    # engineered post-split
    - "risk_score"            # engineered post-split

  extended_features:
    - "login_attempts"
    - "failed_logins"
    - "ip_reputation_score"
    - "session_duration"
    - "network_packet_size"
    - "unusual_time_access"
    - "failed_login_ratio"
    - "risk_score"

# Model Configuration
model:
  type: "RandomForest"
  params:
    n_estimators: 500
    max_depth: 8
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: 1.0
    random_state: 42
    n_jobs: -1
    class_weight: "balanced_subsample"

  decision_threshold: 0.50

  cross_validation:
    folds: 5
    scoring: "recall"
    secondary_scoring: "f2"

# Evaluation Configuration
evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "f2"
  confusion_matrix: true
  roc_auc: true
  pr_auc: true
  threshold_analysis: true

# Output Configuration
output:
  models_dir: "models"
  reports_dir: "reports"
  model_name: "brute_force_detector.pkl"
  save_threshold: true